name: Unit & Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Web: unit + component tests ──────────────────────────────────────────
  test-web:
    name: Web Tests (Vitest + jsdom)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @mercury/shared build

      - name: TypeScript type-check (web)
        run: pnpm --filter @mercury/web exec tsc --noEmit

      - name: Test Web (unit + component)
        run: |
          pnpm --filter @mercury/web test \
            --coverage \
            --coverage.thresholds.branches=70 \
            --coverage.thresholds.functions=75 \
            --coverage.thresholds.lines=80
        env:
          NODE_ENV: test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: packages/web/coverage/
          retention-days: 14

  # ── API: integration tests against real Postgres ─────────────────────
  test-api:
    name: API Tests (Vitest + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     mercury
          POSTGRES_PASSWORD: mercury
          POSTGRES_DB:       mercury_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @mercury/shared build

      - name: TypeScript type-check (api)
        run: pnpm --filter @mercury/api exec tsc --noEmit

      - name: Test API (integration)
        run: pnpm --filter @mercury/api test --coverage
        env:
          DATABASE_URL: postgres://mercury:mercury@localhost:5432/mercury_test
          JWT_SECRET:   ci-test-secret
          NODE_ENV:     test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: packages/api/coverage/
          retention-days: 14
