name: Unit & Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     mercury
          POSTGRES_PASSWORD: mercury
          POSTGRES_DB:       mercury_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @mercury/shared build

      - name: Test API (integration)
        run: pnpm --filter @mercury/api test --coverage
        env:
          DATABASE_URL: postgres://mercury:mercury@localhost:5432/mercury_test
          JWT_SECRET:   ci-test-secret
          NODE_ENV:     test

      - name: Test Web (unit)
        run: pnpm --filter @mercury/web test --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/api/coverage/
            packages/web/coverage/
          retention-days: 14
