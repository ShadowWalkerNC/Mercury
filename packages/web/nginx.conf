server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' blob:; connect-src 'self' wss: https://*.amazonaws.com; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Static assets: long-term cache ───────────────────────────────────────
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Service worker: never cache ───────────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
